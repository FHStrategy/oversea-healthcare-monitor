<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海外医疗集团动态监测</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #003B83;
            --primary-light: #0052B8;
            --primary-lighter: #0066E6;
            --primary-dark: #002B61;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif; 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 20px; 
            background: #f5f7fa;
            min-height: 100vh;
        }
        h1 { 
            background: linear-gradient(135deg, #002B61 0%, #003B83 100%);
            color: white;
            padding: 22px 28px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 25px rgba(0, 59, 131, 0.5);
            font-size: 26px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .summary { 
            background: rgba(255,255,255,0.95); 
            padding: 22px 28px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-left: 5px solid #003B83;
        }
        .summary-title {
            color: #003B83;
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .summary-stats {
            display: flex;
            gap: 35px;
            flex-wrap: wrap;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .stat-label {
            color: #0052B8;
            font-size: 14px;
        }
        .stat-value {
            color: #003B83;
            font-size: 20px;
            font-weight: 700;
        }
        
        /* 标签页 */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 10px 20px;
            background: white;
            border: 2px solid #003B83;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #003B83;
            transition: all 0.2s;
        }
        .tab-btn:hover {
            background: #f0f5ff;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #003B83 0%, #0052B8 100%);
            color: white;
        }
        
        /* 视图切换 */
        .view-switcher {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .view-btn {
            padding: 8px 16px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            transition: all 0.2s;
        }
        .view-btn.active {
            background: #003B83;
            color: white;
            border-color: #003B83;
        }
        
        /* 新闻组 */
        .group-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        }
        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e3f2fd;
        }
        .group-header h2 {
            color: #003B83;
            font-size: 18px;
        }
        .count {
            background: linear-gradient(135deg, #003B83 0%, #0052B8 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 500;
        }
        
        /* 机构区块 */
        .entity-section {
            margin-bottom: 20px;
        }
        .entity-header h3 {
            color: #0052B8;
            font-size: 15px;
            margin-bottom: 10px;
            padding-left: 10px;
            border-left: 3px solid #0052B8;
        }
        
        /* 新闻卡片 */
        .news-item {
            background: #f8fafc;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 3px solid #003B83;
            transition: all 0.2s;
        }
        .news-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(0,59,131,0.15);
        }
        .news-meta {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .entity-tag {
            background: #e3f2fd;
            color: #003B83;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        .entity-tag.sea-tag {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .date-tag {
            color: #666;
            font-size: 11px;
        }
        .news-title {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 6px;
            line-height: 1.5;
        }
        .news-title a {
            color: inherit;
            text-decoration: none;
        }
        .news-title a:hover {
            color: #003B83;
        }
        .news-summary {
            color: #555;
            font-size: 13px;
            line-height: 1.6;
        }
        
        /* 国家筛选提示 */
        #country-filter {
            display: none;
            background: #fff3cd;
            color: #856404;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            align-items: center;
            gap: 10px;
        }
        #country-filter.active {
            display: flex;
        }
        #clear-filter {
            background: #856404;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        /* 页脚 */
        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 12px;
            margin-top: 30px;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            body { padding: 10px; }
            h1 { font-size: 20px; padding: 15px 20px; }
            .summary { padding: 15px; }
            .summary-stats { gap: 20px; }
            .tabs { gap: 5px; }
            .tab-btn { padding: 8px 15px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <h1>🌏 海外医疗集团动态监测</h1>
    
    <div class="summary">
        <div class="summary-title">📊 数据概览</div>
        <div class="summary-stats">
            <div class="stat-item">
                <span class="stat-label" id="stat-label">今日动态</span>
                <span class="stat-value" id="stat-value">-- 家机构</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">最后更新</span>
                <span class="stat-value" id="update-time">--</span>
            </div>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('today', this)">今天</button>
        <button class="tab-btn" onclick="showTab('last3days', this)">近 3 天</button>
        <button class="tab-btn" onclick="showTab('lastweek', this)">近 1 周</button>
    </div>
    
    <div id="country-filter">
        <span>筛选：<strong id="filter-name"></strong></span>
        <button id="clear-filter" onclick="clearFilter()">清除筛选</button>
    </div>
    
    <div id="news-container">
        <div class="loading">⏳ 加载中...</div>
    </div>
    
    <script>
        // 国家旗帜映射
        const locationFlags = {
            "IHH集团": "🌐",
            "新加坡": "🇸🇬",
            "马来西亚": "🇲🇾",
            "泰国": "🇹🇭",
            "印度": "🇮🇳",
            "土耳其": "🇹🇷",
            "其他": "📍"
        };
        
        const LOCATION_ORDER = ["IHH集团", "新加坡", "马来西亚", "泰国", "印度", "土耳其", "其他"];
        
        let allData = null;
        let currentTab = 'today';
        let currentFilter = null;
        
        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('data.json?t=' + Date.now());
                allData = await response.json();
                
                // 更新时间
                document.getElementById('update-time').textContent = 
                    allData.update_time || new Date().toLocaleDateString('zh-CN');
                
                renderNews();
            } catch (error) {
                document.getElementById('news-container').innerHTML = 
                    '<div class="empty-state"><div class="icon">⚠️</div><div>数据加载失败</div></div>';
                console.error('Load error:', error);
            }
        }
        
        // 时间判断
        function getTimeCategory(dateStr) {
            if (!dateStr) return 'lastweek';
            
            const now = new Date();
            let date;
            
            // 解析不同日期格式
            if (dateStr.includes('ago')) {
                // "2 days ago", "1 week ago" 等
                const match = dateStr.match(/(\d+)\s*(day|days|week|weeks|hour|hours)/);
                if (match) {
                    const num = parseInt(match[1]);
                    const unit = match[2];
                    if (unit.includes('hour')) return 'today';
                    if (unit.includes('day') && num <= 1) return 'today';
                    if (unit.includes('day') && num <= 3) return 'last3days';
                    return 'lastweek';
                }
            } else {
                date = new Date(dateStr);
                if (isNaN(date)) return 'lastweek';
            }
            
            if (!date) return 'lastweek';
            
            const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
            if (diffDays <= 0) return 'today';
            if (diffDays <= 3) return 'last3days';
            return 'lastweek';
        }
        
        // 按时间段分组
        function filterByTime(items, timeKey) {
            if (!items) return [];
            
            if (timeKey === 'lastweek') return items;
            if (timeKey === 'last3days') {
                return items.filter(item => {
                    const cat = getTimeCategory(item.date);
                    return cat === 'today' || cat === 'last3days';
                });
            }
            if (timeKey === 'today') {
                return items.filter(item => getTimeCategory(item.date) === 'today');
            }
            return items;
        }
        
        // 按国家分组
        function groupByLocation(items) {
            const grouped = {};
            for (const item of items || []) {
                const loc = item.location || '其他';
                if (!grouped[loc]) grouped[loc] = { entities: {} };
                const entity = item.entity_name || '未知机构';
                if (!grouped[loc].entities[entity]) grouped[loc].entities[entity] = [];
                grouped[loc].entities[entity].push(item);
            }
            return grouped;
        }
        
        // 渲染新闻
        function renderNews() {
            if (!allData) return;
            
            const institutions = filterByTime(allData.institutions, currentTab);
            const seaHealth = filterByTime(allData.sea_health, currentTab);
            
            const grouped = groupByLocation(institutions);
            const seaGrouped = groupSeaByLocation(seaHealth);
            
            // 统计
            const uniqueEntities = new Set(institutions.map(i => i.entity_name));
            document.getElementById('stat-label').textContent = 
                currentTab === 'today' ? '今日动态' : 
                currentTab === 'last3days' ? '近3天动态' : '近1周动态';
            document.getElementById('stat-value').textContent = uniqueEntities.size + ' 家机构';
            
            // 渲染
            let html = '';
            for (const location of LOCATION_ORDER) {
                const locData = grouped[location];
                const seaItems = seaGrouped[location] || [];
                
                if (!locData && seaItems.length === 0) continue;
                
                const entities = locData?.entities || {};
                const totalItems = Object.values(entities).flat().length + seaItems.length;
                const flag = locationFlags[location] || '📍';
                
                // 筛选过滤
                if (currentFilter && currentFilter !== location) continue;
                
                html += `
                    <div class="group-section" data-location="${location}">
                        <div class="group-header">
                            <h2>${flag} ${location}</h2>
                            <span class="count">${totalItems} 条动态</span>
                        </div>
                `;
                
                // 机构新闻
                for (const [entity, items] of Object.entries(entities).sort((a, b) => b[1].length - a[1].length)) {
                    html += `
                        <div class="entity-section">
                            <div class="entity-header">
                                <h3>📍 ${entity} (${items.length} 条)</h3>
                            </div>
                    `;
                    for (const item of items) {
                        html += `
                            <div class="news-item">
                                <div class="news-meta">
                                    <span class="entity-tag">${item.entity_name || ''}</span>
                                    <span class="date-tag">${item.date || ''}</span>
                                </div>
                                <h4 class="news-title"><a href="${item.url}" target="_blank">${item.title}</a></h4>
                                <div class="news-summary">${item.summary_zh || item.snippet || ''}</div>
                            </div>
                        `;
                    }
                    html += `</div>`;
                }
                
                // 东南亚卫生动态
                if (seaItems.length > 0) {
                    html += `
                        <div class="entity-section">
                            <div class="entity-header">
                                <h3>🌏 卫生动态 (${seaItems.length} 条)</h3>
                            </div>
                    `;
                    for (const item of seaItems) {
                        html += `
                            <div class="news-item">
                                <div class="news-meta">
                                    <span class="entity-tag sea-tag">政策动态</span>
                                    <span class="date-tag">${item.date || ''}</span>
                                </div>
                                <h4 class="news-title"><a href="${item.url}" target="_blank">${item.title}</a></h4>
                                <div class="news-summary">${item.summary_zh || item.snippet || ''}</div>
                            </div>
                        `;
                    }
                    html += `</div>`;
                }
                
                html += `</div>`;
            }
            
            if (!html) {
                html = '<div class="empty-state"><div class="icon">📭</div><div>暂无新闻动态</div></div>';
            }
            
            document.getElementById('news-container').innerHTML = html;
        }
        
        // 东南亚动态按国家分组
        function groupSeaByLocation(items) {
            const grouped = {};
            for (const item of items || []) {
                const loc = item.sea_country || item.location || '其他';
                if (!grouped[loc]) grouped[loc] = [];
                grouped[loc].push(item);
            }
            return grouped;
        }
        
        // 切换标签
        function showTab(tabName, btn) {
            currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
            renderNews();
        }
        
        // 清除筛选
        function clearFilter() {
            currentFilter = null;
            document.getElementById('country-filter').classList.remove('active');
            renderNews();
        }
        
        // 初始化
        loadData();
    </script>
    
    <div class="footer">
        📌 数据来源：Firecrawl 搜索引擎 | 自动采集，每日更新
    </div>
</body>
</html>
